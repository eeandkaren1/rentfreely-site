name: 部署後冒煙測試
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: 輪詢等待 Render 部署新版上線（最多 8 分鐘）
        run: |
          echo "等待正式站出現本次版本標記 rwf-build ..."
          for i in $(seq 1 24); do
            if curl -sf https://rentfreelylife.com/articles/ | grep -q "rwf-build"; then
              echo "✅ 新版已上線（第 $((i*20)) 秒偵測到）"
              exit 0
            fi
            echo "…第 $((i*20)) 秒：尚未上線，繼續等待"
            sleep 20
          done
          echo "❌ 等待 8 分鐘後正式站仍是舊版 — 請到 Render Dashboard 檢查 Deploy 是否失敗"
          exit 1

      - name: 首頁存活與內容檢查
        run: |
          BODY=$(curl -sf https://rentfreelylife.com/) || { echo "❌ 首頁無法連線"; exit 1; }
          echo "$BODY" | grep -q "7 大工具" || { echo "❌ 首頁缺少最新工具區內容"; exit 1; }
          echo "$BODY" | grep -q "ca-pub-9753491901026477" || { echo "❌ 首頁缺少 AdSense 代碼"; exit 1; }
          echo "✅ 首頁正常"

      - name: 搜尋索引 search.json 檢查
        run: |
          curl -sf https://rentfreelylife.com/search.json -o /tmp/s.json || { echo "❌ search.json 無法載入"; exit 1; }
          python3 -c "
          import json
          d = json.load(open('/tmp/s.json'))
          assert len(d) >= 61, f'文章數異常: {len(d)}'
          assert any('寵物' in a['title'] for a in d), '索引中找不到寵物文章'
          print(f'✅ search.json 正常（{len(d)} 篇，含寵物文章）')
          "

      - name: 關鍵頁面存活檢查
        run: |
          for p in /articles/pet-agreement-template/ /privacy/ /disclaimer/ /ads.txt /sitemap.xml /llms.txt /robots.txt; do
            curl -sfo /dev/null "https://rentfreelylife.com$p" || { echo "❌ $p 無法存取"; exit 1; }
            echo "✅ $p"
          done
