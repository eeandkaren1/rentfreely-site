title: 租事無憂
description: 房東房客一站式租屋知識平台。押金試算、修繕責任判定、點交清單、政府政策整理，讓每段租賃有據可循。
# ⚠️ 部署到 Render 後，把下面這行改成 Render 給你的網址
# 例如：url: "https://rentfreely-site.onrender.com"
# 之後買網域再改成正式網址：url: "https://rentfreely.life"
url: "https://rentfreely-site.onrender.com"
baseurl: ""
lang: zh-TW
timezone: Asia/Taipei

# SEO
author: 租事無憂
social:
  name: 租事無憂
  links:
    - https://www.instagram.com/rentfreely.life/
    - https://www.facebook.com/profile.php?id=61591464345443
    - https://www.threads.com/@rentfreely.life

# Build
markdown: kramdown
permalink: /articles/:slug/

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed

# 新增：強制包含靜態驗證檔案，避免被 Jekyll 忽略
include:
  - ads.txt

# Exclude
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - README.md
  - render.yaml

# Collections
collections:
  articles:
    output: true
    permalink: /articles/:slug/

defaults:
  - scope:
      path: ""
      type: articles
    values:
      layout: article
